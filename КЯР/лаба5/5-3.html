<!DOCTYPE html>
<html>
<head>
  <title>Регистрация постоянного клиента</title>
  <style>
    body {
      background-color: indigo; 
      font-size: 1.2em; 
      width: 50%; 
    }
label{
    display: inline-block; 
width: 20em; 
  
}

    form {
      background-color: rgba(255, 255, 255, 0.5); 
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); 
    }

    input[type="text"],
    input[type="number"],
    textarea {
      background-color: rgba(255, 255, 255, 0.5); 
      color: rgba(255, 255, 255, 1); 
      border: 1px solid rgba(255, 255, 255, 0.5); 
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.75); 
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus {
      background-color: white; 
      color: black; 
    }

    input[type="email"] { 
      background-color: rgba(255, 255, 255, 0.5);
      color: rgba(255, 255, 255, 1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.75);
    }

    input[type="radio"] {
      margin-right: 5px;
    }

    select {
      padding: 8px;
      margin: 5px 0;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 5px;
    }

    button {
      background-color: navy; 
      color: white;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 0 4px white; 
      margin: 10px;
    }
  </style>
</head>
<body>

  <form>
    <h1>Регистрация постоянного клиента</h1>
    <div>
    <label >Фамилия:</label>
    <input type="text" id="fam" name="fam">
    </div>

    <div>
    <label >Имя:</label>
    <input type="text" id="im" name="im">
    </div>

    <div>
    <label>Отчество:</label>
    <input type="text" id="otch" name="otch">
   </div>

    <div>
    <label >Ваш возраст:</label>
    <input type="number" id="age" name="age">
    </div>

    <div>
    <label>Пол:</label>
    <input type="radio" id="male" name="sex" value="мужской">
    мужской
    <input type="radio" id="female" name="sex" value="женский">
    женский
</div>

<div>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email">
</div>

<div>
    <label for="country">Страна проживания:</label>
    <input type="text" id="country" name="country">
</div>

<div>
    <label for="source">Откуда вы узнали о нас?</label>
    <select id="source" name="source">
      <option value="друзья">Друзья</option>
      <option value="реклама">Реклама</option>
      <option value="интернет">Интернет</option>
</div>
    </select>

<div>
    <label for="date">Дата заполнения:</label>
    <input type="date" id="date" name="date">
</div>

<div>
    <button type="submit">Регистрация</button>
</div>

<div>
    <button type="reset">Отмена</button>
</div>
  </form>

</body>
</html>
