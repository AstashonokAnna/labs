<!DOCTYPE html>
<html>
<head>
  <title>Таблица</title>
  <style>
    
 table{
 empty-cells: hide;
 
 }
  th{text-align: center;
    font-size: 1.2em;
     background-color: #00BF;
      border: 2px solid black;}
    td{border: 2px solid black;}
     .q{background-color:darkblue;}
     .w{background-color: purple;}
     .e{background-color: green;}

        
  </style>
</head>
<body>

  <h1>Russia: Top smartphone vendors</h1>
  <h2>Q1 2021</h2>

  <table>
    <thead>
      <tr>
        <th></th>
        <th>Vendor</th>
        <th>Unit Share</th>
        <th>Annual Growth</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>#1 ↑</td>
        <td class="q">Xiaomi</td>
        <td class="w">32%</td>
        <td class="e">+125%</td>
      </tr>
      <tr>
        <td>#2 ↑</td>
        <td class="q">Samsung</td>
        <td class="w">27%</td>
        <td class="e">+41%</td>
      </tr>
      <tr>
        <td>#3 ↑</td>
        <td class="q">Honor</td>
        <td class="w">10%</td>
        <td class="e">0%</td>
      </tr>
      <tr>
        <td>#4 ↔</td>
        <td class="q">Apple</td>
        <td class="w">9%</td>
        <td class="e">+24%</td>
      </tr>
      <tr>
        <td>#5 ↔</td>
        <td class="q">Realme</td>
        <td class="w">9%</td>
        <td class="e">+682%</td>
      </tr>
      <tr>
        <td> </td>
        <td class="q">Total</td>
        <td class="w">82%</td>
        <td class="e">682%</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
