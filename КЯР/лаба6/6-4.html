<!DOCTYPE html>
<head html>
<head>
<style>
body {
  display: flex;
  height: 100px; 
}

.box {
  width: 100px;
  height: 100px;
  margin: 10px;
  border: 1px solid black;
}

.box1 {
  background-image: linear-gradient(to bottom, rgb(238, 84, 202), rgb(70, 119, 242)); 
}

.box2 {
  background-image: repeating-linear-gradient(45deg, rgb(238, 84, 202) 25px,  rgb(70, 119, 242) 50px); 
}

.box3 {
  background-image: radial-gradient(circle,rgb(238, 84, 202), rgb(70, 119, 242)); 
}

.box4 {
  background-image:  repeating-radial-gradient(rgb(238, 84, 202) 7px,  rgb(70, 119, 242)15px);
}

.box5 {
  background-image: radial-gradient(circle, rgb(238, 84, 202 ), rgb(70, 119, 242), rgb(158, 65, 239), transparent), linear-gradient( rgb(117, 1, 1), rgb(189, 9, 93)); 
}

</style>
<body>

<div class="box box1"></div>
<div class="box box2"></div>
<div class="box box3"></div>
<div class="box box4"></div>
<div class="box box5"></div>

</body>
</head>
</html>
