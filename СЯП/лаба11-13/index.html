<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаба 11-13</title>
</head>
<style>
    
body{
    font-family: sans-serif;
}

.header{
    text-align: center;
    color: rgb(213, 3, 150);
    font-size: 60px;
}

.field_of_enter{
    display:flex;
    justify-content: center;
    height:50px;
}

.enter{
    width: 600px;
    margin-right: 8px;
    border: 2px, solid, rgb(128, 128, 128);
    border-radius: 8px;
    font-family: sans-serif;
    font-size: 19px;
}

.enter::placeholder
{
    font-family: sans-serif;
    font-size: 19px;
}


.add_task
{
    color: white;
    background-color: rgb(213, 3, 150);
    font-family: sans-serif;
    width: 100px;
    font-size: 17px;
    border: 2px, solid, rgb(213, 3, 150);
    border-radius: 8px;
}

.add_task:hover{
    background-color: rgb(213, 3, 150);
    border-color: rgb(213, 3, 150);
}

.button_show{
    display: flex;
    justify-content: center;
    margin-top: 30px;
    gap:10px;
    height: 50px;
}

.show_all, .show_complete, .show_incomplete{
    font-family: sans-serif;
    font-size: 17px;
    border-radius: 8px;
    background-color: rgb(213, 3, 150);
    border: 2px, solid, rgb(213, 3, 150);
    color: white;
    width: fit-content;
}

.show_all:hover, .show_complete:hover, .show_incomplete:hover{
    background-color: rgb(213, 3, 150);
    border-color: rgb(213, 3, 150);
}

.task-list{
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.task-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 700px;
    padding: 10px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    transition: all 0.3s ease;
    height: 40px;
}

.task-item:hover {
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transform: translateY(-2px);
}

.add_task, .show_all, .show_complete, .show_incomplete {
    cursor: pointer;
    transition: all 0.3s ease;
}

.enter:focus {
    outline: none;
    border-color: rgb(213, 3, 150);
    box-shadow: 0 0 5px rgba(167, 3, 213, 0.3);
}

.task-item input[type="checkbox"] {
    appearance: none;

    width: 15px;
    height: 15px;
    border: 2px solid #ccc;
    border-radius: 6px;
    cursor: pointer;
    background-color: #fff;
    position: relative;
    transition: all 0.2s ease;
}

.task-item input[type="checkbox"]:hover {
    border-color: #d000ff;
}

.task-item input[type="checkbox"]:checked {
    background-color: #d000ff;
    border-color: #d000ff;
}

.task-item input[type="checkbox"]:checked::after {
    content: "✓";
    position: absolute;
    left: 2px;
    color: white;
    font-size: 10px;
    font-weight: bold;
}
</style>
<body>
    <h1 class = "header">Список дел</h1>
    <div class="field_of_enter">
        <input placeholder="Напишите здесь свою задачу" class="enter" type="text" maxlength="40" required>
        <button class="add_task" type="submit">Добавить</button>
    </div>
    <div class="button_show">
        <button class="show_all">Показать все</button>
        <button class="show_complete">Показать выполненные</button>
        <button class="show_incomplete">Показать не выполненные</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
