<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаба15</title>
</head>
<style>
    body{
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
}

form{
    border: 2px solid black;
    width: 600px;
    margin: auto;
}

table, h3{
    margin-left: 10px;
}

input, textarea{
    border-radius: 5px;
    background-color: rgb(226, 226, 226);
    border: 1px solid rgb(195, 194, 194);
}

input[type="checkbox"]{
    appearance: none;
    -webkit-appearance: none;
    background-color: rgb(226, 226, 226);
    width: 16px;
    height: 16px;
    border: 1px solid rgb(195, 194, 194);
    border-radius: 3px;
}

input[type="checkbox"]:checked {
    background-color: #18b31d;
    position: relative;
}

input[type="checkbox"]:checked::before {
    content: "✓";
    position: absolute;
    color: white;
    font-size: 14px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

input[type="radio"]{
    appearance: none;
    -webkit-appearance: none;
    background-color: rgb(226, 226, 226);
    width: 12px;
    height: 10px;
    border: 1px solid rgb(195, 194, 194);
    border-radius: 10px;
}

input[type="radio"]:checked {
    background-color: #666;
}

input[type="radio"]:checked::before {
    content: "";
    position: relative;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    background-color: white;
    border-radius: 50%;
}

table tr td{
    padding-top: 10px;
}

table{
    margin-bottom: 10px;
}

input[type="submit"]
{
    width: 120px;
    height: 40px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    background-color: rgb(255, 0, 162);
    color: white;
    border: 1px solid black;
}
</style>
<body>
    <form>
        <h3>Заполните форму:</h3>
        <table>
            <tr>
                <td><label for="familia">Фамилия</label></td>
                <td><input maxlength="20" pattern="[A-Za-zА-Яа-яёЁ]+" id="familia" type="text" required="true"></td>
            </tr>
            <tr>
                <td><label for="name">Имя</label></td>
                <td><input maxlength="20" pattern="[A-Za-zА-Яа-яёЁ]+" required="true" id="name" type="text"></td>
            </tr>
            <tr>
                <td><label for="email">E-mail</label></td>
                <td><input required="true" pattern="^[A-Za-z0-9]+@[a-z]{2,5}\.[a-z]{2,3}$" id="email" type="email"></td>
            </tr>
            <tr>
                <td><label for="phoneNumber">Телефон (0xx)xxx-xx-xx</label></td>
                <td><input pattern="^\(0[0-9]{2}\)[0-9]{3}-[0-9]{2}-[0-9]{2}$" required="true" id="phoneNumber" type="text" maxlength="14"></td>
            </tr>
            <tr>
                <td><label for="city">Город</label></td>
                <td><input required="true" id="city" list="cityList" type="text" value="Минск"></td>
            </tr>
            <tr>
                <td><label for="bstu">Я учусь в БГТУ</label></td>
                <td><input checked="true" required="true" id="bstu" type="checkbox"></td>
            </tr>
            <tr>
                <td><label for="change">На каком курсе Вы учитесь?</label></td>
                <td>
                    <input required="true" id="change" type="radio" value="1" name="check">1
                    <input required="true" id="change" type="radio" value="2" name="check">2
                    <input required="true" id="change" type="radio" value="3" name="check" checked="true">3
                    <input required="true" id="change" type="radio" value="4" name="check">4
                </td>
            </tr>
            <tr>
                <td><label for="info">Расскажите о себе</label></td>
                <td><textarea required="true" maxlength="250" id="info" name="information" cols="30" rows="4"></textarea></td>
            </tr>
            <tr>
                <td><input type="submit"></td>
            </tr>
        </table>
    </form>
    <datalist id="cityList">      
        <option value="Могилев"></option>
        <option value="Минск"></option>
        <option value="Витебск"></option>
        <option value="Брест"></option>
        <option value="Гродно"></option>
        <option value="Гомель"></option>
    </datalist>
    <script src="script.js"></script>
</body>
</html>
